<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב פנים חכם</title>
    <!-- טעינת Tailwind CSS לעיצוב -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- טעינת ספריית face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        /* היפוך הוידאו והקנבס כדי ליצור אפקט מראה */
        #videoElement, #canvasElement {
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full flex flex-col items-center">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                מעקב פנים חכם
            </h1>
            <p class="text-slate-400">זיהוי פנים מרובה וציור מסלול תנועה בזמן אמת</p>
        </div>

        <!-- הודעת שגיאה (מוסתרת כברירת מחדל) -->
        <div id="errorBox" class="hidden items-center gap-2 text-red-400 bg-red-400/10 p-4 rounded-lg mb-6 w-full justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span id="errorMessage"></span>
        </div>

        <!-- מיכל הוידאו והקנבס -->
        <div class="relative rounded-2xl overflow-hidden shadow-2xl shadow-emerald-500/10 bg-slate-800 border-2 border-slate-700 w-full aspect-video flex items-center justify-center">
            
            <!-- שכבת טעינה וכפתור הפעלה -->
            <div id="overlay" class="absolute flex flex-col items-center gap-4 z-10">
                <div id="loadingSpinner" class="animate-spin text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                </div>
                <span id="statusText" class="text-slate-300">טוען ספריית זיהוי...</span>
                
                <button id="startBtn" class="hidden items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-full font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    הפעל מצלמה
                </button>
            </div>

            <!-- הוידאו מוסתר בהתחלה דרך opacity-0 -->
            <video id="videoElement" class="w-full h-full opacity-0 transition-opacity duration-500" muted playsinline></video>
            
            <canvas id="canvasElement" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
        </div>

        <div class="mt-8 bg-slate-800/50 p-6 rounded-xl text-sm text-slate-400 w-full text-center border border-slate-700">
            <p>
                האפליקציה משתמשת במודל AI ישירות בתוך הדפדפן (מותאם ל-GitHub Pages). 
                <br/>
                המידע והתמונות לא נשלחים לשום שרת, הכל מעובד מקומית על המכשיר שלך.
            </p>
        </div>

    </div>

    <script>
        // משתנים גלובליים
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        
        let trailPoints = []; // שמירת היסטוריית מיקומים

        function showError(msg) {
            errorMessage.innerText = msg;
            errorBox.classList.remove('hidden');
            errorBox.classList.add('flex');
        }

        // פונקציה שנקראת ברגע שהדף וספריית face-api.js נטענו
        window.addEventListener('load', async () => {
            if (typeof faceapi === 'undefined') {
                showError("שגיאה בטעינת ספריית face-api. ודא שיש חיבור לאינטרנט.");
                statusText.innerText = "שגיאה";
                loadingSpinner.classList.add('hidden');
                return;
            }

            statusText.innerText = "טוען מודלים לזיהוי פנים...";
            
            try {
                // נתיב המודלים (מה-CDN)
                const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
                    faceapi.nets.ageGenderNet.loadFromUri(modelUrl)
                ]);

                // המודלים נטענו בהצלחה - נציג את כפתור ההפעלה
                statusText.classList.add('hidden');
                loadingSpinner.classList.add('hidden');
                startBtn.classList.remove('hidden');
                startBtn.classList.add('flex');

            } catch (err) {
                console.error(err);
                showError("שגיאה בטעינת המודלים. ייתכן שיש חסימת רשת מול ה-CDN.");
            }
        });

        // הפעלת מצלמה בלחיצה על הכפתור
        startBtn.addEventListener('click', async () => {
            errorBox.classList.add('hidden');
            startBtn.classList.add('hidden');
            statusText.classList.remove('hidden');
            loadingSpinner.classList.remove('hidden');
            statusText.innerText = "מבקש גישה למצלמה...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    await video.play();
                    // הסתרת שכבת הטעינה
                    overlay.classList.add('hidden');
                    // הצגת הוידאו
                    video.classList.remove('opacity-0');
                    video.classList.add('opacity-100');
                    
                    // התחלת תהליך הזיהוי
                    startDetection();
                };
            } catch (err) {
                console.error(err);
                showError("שגיאה בגישה למצלמה. אנא ודא שאישרת גישה בדפדפן.");
                startBtn.classList.remove('hidden');
                statusText.classList.add('hidden');
                loadingSpinner.classList.add('hidden');
            }
        });

        // לולאת הזיהוי
        function startDetection() {
            // התאמת גודל הקנבס לגודל המוצג בפועל
            const videoRect = video.getBoundingClientRect();
            const displaySize = { width: videoRect.width, height: videoRect.height };
            
            canvas.width = displaySize.width;
            canvas.height = displaySize.height;
            faceapi.matchDimensions(canvas, displaySize);
            
            const ctx = canvas.getContext('2d');

            async function detectLoop() {
                if (video.paused || video.ended) return;

                const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
                const detections = await faceapi.detectAllFaces(video, options).withAgeAndGender();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // --- שובל תנועה ---
                let currentPoints = [...trailPoints];
                const primaryDetection = resizedDetections.length > 0 ? resizedDetections[0] : null;

                if (primaryDetection) {
                    const box = primaryDetection.detection.box;
                    const center = { x: box.x + box.width / 2, y: box.y + box.height / 2 };
                    currentPoints.unshift(center);
                } else {
                    currentPoints.unshift(null);
                }

                if (currentPoints.length > 40) {
                    currentPoints.pop();
                }
                trailPoints = currentPoints;

                // ציור שובל
                for (let i = 1; i < currentPoints.length; i++) {
                    if (!currentPoints[i - 1] || !currentPoints[i]) continue;
                    const thickness = Math.sqrt(40 / (i + 1)) * 2.5;
                    ctx.beginPath();
                    ctx.moveTo(currentPoints[i - 1].x, currentPoints[i - 1].y);
                    ctx.lineTo(currentPoints[i].x, currentPoints[i].y);
                    ctx.strokeStyle = `rgba(239, 68, 68, ${1 - (i / 40)})`;
                    ctx.lineWidth = thickness;
                    ctx.stroke();
                }

                // --- ציור תיבות וטקסט (גבר/אישה) ---
                resizedDetections.forEach(result => {
                    const box = result.detection.box;
                    const gender = result.gender; 
                    
                    // ציור מסגרת אדומה
                    ctx.strokeStyle = '#ff3b3b';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);

                    let text = 'Face Tracked';
                    if (gender === 'male') {
                        text = 'זוהה גבר';
                    } else if (gender === 'female') {
                        text = 'זוהתה אישה';
                    }

                    // ציור הטקסט (עם היפוך בגלל אפקט המראה ובגלל עברית)
                    ctx.save();
                    ctx.scale(-1, 1);
                    
                    ctx.fillStyle = '#ff3b3b';
                    ctx.font = 'bold 20px sans-serif';
                    
                    const textWidth = ctx.measureText(text).width;
                    const textX = -(box.x + box.width);

                    // רקע לטקסט
                    ctx.fillRect(textX - 10, box.y - 25, textWidth + 20, 25);
                    
                    // הטקסט עצמו בלבן
                    ctx.fillStyle = 'white';
                    ctx.fillText(text, textX, box.y - 7);

                    ctx.restore();
                });

                requestAnimationFrame(detectLoop);
            }

            detectLoop();
        }
    </script>
</body>
</html>
